<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>OAuth2 Callback</title>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script type="module">
    import { exchangeCodeForToken, initOctokit, getProviderId, successfulLogin, failedLogin } from "./auth.js";

    async function main() {
      const providerId = getProviderId();
      console.log("callback.html: Opening OAuth2 callback window with provider " + providerId);
      $("#output").text("Provider ID: " + providerId);
      const params = new URLSearchParams(window.location.search);
      const code = params.get("code");

      if (!code) {
        console.error("callback.html: Did not receive 'code'");
        $("#output").text("Did not receive 'code'.");
        failedLogin(providerId);
        return;
      }

      const tokenResponse = await exchangeCodeForToken(code);

      if (tokenResponse.error) {
        console.error("callback.html: Error exchanging code for token:", tokenResponse);
        $("#output").text("Error: " + JSON.stringify(tokenResponse, null, 2));
        failedLogin(providerId);
        return;
      }

      const token = tokenResponse.access_token;
      successfulLogin(token, providerId);
      const octokit = initOctokit(token);

      const user = await octokit.rest.users.getAuthenticated();
      $("#output").text(JSON.stringify(user.data, null, 2));
      window.location.href = "../"; // Redirect back to main app after successful login
    }

    main().catch(err => {
      console.error("callback.html: Unexpected error:", err);
      $("#output").text("Unexpected error: " + err);
      const providerId = getProviderId();
      failedLogin(providerId);
    });
  </script>
</head>
<body>
  <h2>Processing OAuth2 PKCE authentication…</h2>
  <input type="button" value="Back" onclick="window.location.href='../';">
  <pre id="output"></pre>
</body>
</html>
